name: Landing Page

on:
  push:
    branches: [main]
    paths:
      - 'landing/**'
      - 'charts/agentdance-landing/**'

env:
  IMAGE: us-docker.pkg.dev/baldmaninc/gcr.io/agentdance-landing
  GKE_CLUSTER: clusterkit
  GKE_REGION: us-central1

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Authenticate Docker to Artifact Registry
        run: gcloud auth configure-docker us-docker.pkg.dev --quiet

      - name: Build and push
        run: |
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest landing/
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Get GKE credentials
        run: gcloud container clusters get-credentials $GKE_CLUSTER --region $GKE_REGION

      - name: Deploy with Helm
        run: |
          helm upgrade --install agentdance-landing charts/agentdance-landing \
            --namespace agentdance \
            --set image.tag=${{ github.sha }} \
            --set image.repository=$IMAGE
          kubectl rollout status deployment/agentdance-landing -n agentdance --timeout=120s
