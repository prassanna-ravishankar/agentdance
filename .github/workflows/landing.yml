name: Landing Page

on:
  push:
    branches: [main]
    paths:
      - 'landing/**'

env:
  IMAGE: us-docker.pkg.dev/baldmaninc/gcr.io/agentdance-landing

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate Docker to Artifact Registry
        run: gcloud auth configure-docker us-docker.pkg.dev --quiet

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: landing
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to GKE
        run: |
          gcloud container clusters get-credentials clusterkit --region us-central1
          kubectl set image deployment/agentdance-landing landing=${{ env.IMAGE }}:${{ github.sha }} -n agentdance
