apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: agentdance-prod
  namespace: clusterkit
  annotations:
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
spec:
  parentRefs:
    - name: clusterkit-gateway
      namespace: clusterkit
  hostnames:
    - "agentdance.ai"
  rules:
    - backendRefs:
        - name: agentdance-landing
          namespace: agentdance
          port: 80
